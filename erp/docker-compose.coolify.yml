version: '3.8'

services:
  api:
    image: ghcr.io/yourusername/school-erp-api:latest
    container_name: school-erp-api
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - PORT=3000
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    image: ghcr.io/yourusername/school-erp-frontend:latest
    container_name: school-erp-frontend
    ports:
      - "80:80"
    environment:
      - PUBLIC_API_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M