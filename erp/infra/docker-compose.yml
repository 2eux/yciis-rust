version: '3.8'

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: school-erp-api
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - RUST_LOG=info
      - PORT=3000
      - RUST_BACKTRACE=0
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - erp-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: school-erp-frontend
    ports:
      - "5173:80"
    read_only: true
    tmpfs:
      - /tmp:size=1M,mode=1777
    restart: unless-stopped
    networks:
      - erp-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: school-erp-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --protected-mode yes
      --bind 127.0.0.1
    volumes:
      - redis_data:/data
    user: "999:999"
    read_only: false
    restart: unless-stopped
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privilege:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

volumes:
  redis_data:
    driver: local

networks:
  erp-network:
    driver: bridge
    name: erp-network
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      config:
        - subnet: 172.28.0.0/16